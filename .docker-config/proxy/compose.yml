services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=${PROJECT_PREFIX:-default}_proxy"
      - "--entryPoints.web.address=:80"
      # Preserve encoded characters verbatim — S3 signed URLs depend on
      # encoded slashes and percent signs matching the signature exactly.
      - "--entryPoints.web.http.encodedcharacters.allowencodedslash=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodedbackslash=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodednullcharacter=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodedsemicolon=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodedpercent=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodedquestionmark=true"
      - "--entryPoints.web.http.encodedcharacters.allowencodedhash=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--accesslog=false"
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  home:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wt-home.rule=Host(`wt.localhost`)"
      - "traefik.http.routers.wt-home.entrypoints=web"
      - "traefik.http.routers.wt-home.service=wt-home"
      - "traefik.http.services.wt-home.loadbalancer.server.port=80"
      # Same host, /api path → Traefik's internal API (same-origin for fetch).
      # No explicit priority — longer rules win automatically.
      - "traefik.http.routers.wt-api.rule=Host(`wt.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.wt-api.entrypoints=web"
      - "traefik.http.routers.wt-api.service=api@internal"

networks:
  proxy:
    name: ${PROJECT_PREFIX:-default}_proxy
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

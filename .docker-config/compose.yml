services:
  app:
    build:
      target: rails
      args:
        APP_USER_UID: ${UID:-1000}
        APP_GROUP_GID: ${GID:-1000}
        RUBY_VERSION: ${RUBY_VERSION}
        NODE_VERSION: ${NODE_VERSION}
    stdin_open: true
    env_file: .env
    environment:
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      DOMAIN: ${WORKTREE_HOST}
      GEM_VOLUME: ${GEM_VOLUME}
    deploy:
      resources:
        limits:
          cpus: "10"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - dev
      - proxy
    extra_hosts:
      - "${WORKTREE_HOST}:host-gateway"
      - "${S3_HOST}:host-gateway"
      - "${RUSTFS_UI_HOST}:host-gateway"
    ports:
      - "0.0.0.0:${RUBY_DEBUG_PORT:-38698}:38698"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.rule=Host(`${WORKTREE_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-app.entrypoints=web"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-app.loadbalancer.server.port=3000"
    volumes:
      - ../${CURRENT_WORKTREE_NAME}:/app
      - ${MAIN_WORKTREE_PATH}/.git:${MAIN_WORKTREE_PATH}/.git:ro
      - ../.docker-config/entrypoint-app.sh:/usr/local/bin/entrypoint-app.sh:ro
      - ../.docker-config/home:/home/appuser
      - shared_gems:/usr/local/bundle
      - shared_node_modules:/app/node_modules
      - ${SOCKET_DIR:-/tmp/sockets}/redis:/data/socket
      - ${SOCKET_DIR:-/tmp/sockets}/db:/var/run/postgresql
    entrypoint: ["entrypoint-app.sh"]
    command: ["bin/dev"]

  redis:
    image: redis:7-alpine
    volumes:
      - ${SOCKET_DIR:-/tmp/sockets}/redis:/data/socket
    networks:
      - dev
    command: >
      redis-server
      --unixsocket /data/socket/redis.sock
      --unixsocketperm 777
      --port 0
      --loglevel warning
      --save ''
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-s", "/data/socket/redis.sock", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${PGPASSWORD:-password}
    networks:
      - dev
    volumes:
      - db_data:/var/lib/postgresql/data
      - ${SOCKET_DIR:-/tmp/sockets}/db:/var/run/postgresql
      - ../.docker-config/initdb/restore-dump.sh:/docker-entrypoint-initdb.d/restore-dump.sh:ro
      - ${DB_DUMP_DIR:-../.docker-config/db-dumps}:/db-dumps:ro
    command: >
      postgres
      -c shared_preload_libraries='pg_stat_statements'
      -c pg_stat_statements.track='all'
      -c max_connections=200
      -c max_locks_per_transaction=256
      -c shared_buffers=1GB
      -c temp_buffers=128MB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
      -c max_wal_senders=0
      -c wal_level=minimal
      -c wal_compression=off
      -c checkpoint_timeout=1h
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c autovacuum=off
      -c random_page_cost=1.0
      -c seq_page_cost=0.1
      -c log_statement=none
      -c log_checkpoints=off
      -c log_autovacuum_min_duration=-1
      -c log_temp_files=-1
      -c max_parallel_workers_per_gather=4
      -c parallel_setup_cost=0
      -c parallel_tuple_cost=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nvim:
    build:
      target: nvim
      args:
        APP_USER_UID: ${UID:-1000}
        APP_GROUP_GID: ${GID:-1000}
        RUBY_VERSION: ${RUBY_VERSION}
        NODE_VERSION: ${NODE_VERSION}
    volumes:
      - ../.docker-config/home:/home/appuser
      - ../${CURRENT_WORKTREE_NAME}:/app
      - ${MAIN_WORKTREE_PATH}/.git:${MAIN_WORKTREE_PATH}/.git
      - shared_gems:/usr/local/bundle
      - shared_node_modules:/app/node_modules
      - ${SSH_PATH}:/home/appuser/.ssh:ro
      - ../.docker-config/entrypoint-nvim.sh:/usr/local/bin/entrypoint-nvim.sh:ro
      - ${SOCKET_DIR:-/tmp/sockets}/redis:/data/socket
      - ${SOCKET_DIR:-/tmp/sockets}/db:/var/run/postgresql
      - ~/.config/git/ignore:/home/appuser/.config/git/ignore:ro
    tty: true
    stdin_open: true
    env_file: .env
    environment:
      GEM_VOLUME: ${GEM_VOLUME}
    networks:
      - dev
    ports:
      - "0.0.0.0:${NVIM_PORT:-7777}:7777"
    entrypoint: ["entrypoint-nvim.sh"]
    command: ["/usr/local/bin/nvim", "--headless", "--listen", "0.0.0.0:7777"]

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.0-noble
    shm_size: "1gb"
    ipc: host
    init: true
    # ports:
    #   - "${PLAYWRIGHT_PORT:-8888}:8888"
    networks:
      - dev
    extra_hosts:
      - "${WORKTREE_HOST}:host-gateway"
      - "${S3_HOST}:host-gateway"
      - "${RUSTFS_UI_HOST}:host-gateway"
    command: ["npx", "-y", "playwright@1.59.0", "run-server", "--port", "8888"]

  rustfs-init:
    image: alpine
    volumes:
      - rustfs_data:/data
      - ${DB_DUMP_DIR:-../.docker-config/db-dumps}:/db-dumps:ro
    command: >
      sh -c '
        if [ -f /db-dumps/rustfs_data.tar.gz ] && [ ! -d /data/rustfs0 ]; then
          echo "rustfs-init: Restoring RustFS data from backup..."
          tar xzf /db-dumps/rustfs_data.tar.gz -C /data
          echo "rustfs-init: Done."
        else
          echo "rustfs-init: No restore needed."
        fi
      '
    networks:
      - dev

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.83
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0..3} # Define 4 storage volumes
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
    volumes:
      - rustfs_data:/data
    networks:
      - dev
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3.rule=Host(`${S3_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3.service=${COMPOSE_PROJECT_NAME}-s3"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-s3.loadbalancer.server.port=9000"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3-ui.rule=Host(`${RUSTFS_UI_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3-ui.entrypoints=web"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-s3-ui.service=${COMPOSE_PROJECT_NAME}-s3-ui"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-s3-ui.loadbalancer.server.port=9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  claude:
    image: ${PROJECT_PREFIX}/claude:latest
    build:
      target: claude
      args:
        APP_USER_UID: ${UID:-1000}
        APP_GROUP_GID: ${GID:-1000}
        RUBY_VERSION: ${RUBY_VERSION}
        NODE_VERSION: ${NODE_VERSION}
        CLAUDE_CODE_VERSION: "latest"
        GIT_DELTA_VERSION: "0.18.2"
    volumes:
      - ../.docker-config/home:/home/appuser
      - claude_bashhistory:/commandhistory
      - ../${CURRENT_WORKTREE_NAME}:/app
      - ${MAIN_WORKTREE_PATH}/.git:${MAIN_WORKTREE_PATH}/.git
      - shared_gems:/usr/local/bundle
      - shared_node_modules:/app/node_modules
      - ${SOCKET_DIR:-/tmp/sockets}/redis:/data/socket
      - ${SOCKET_DIR:-/tmp/sockets}/db:/var/run/postgresql
      - ${SSH_PATH}:/home/appuser/.ssh:ro
      - ${SSH_AUTH_SOCK}:/tmp/ssh-agent.sock:ro
      - ~/.config/git/ignore:/home/appuser/.config/git/ignore:ro
    tty: true
    stdin_open: true
    env_file: .env
    environment:
      GEM_VOLUME: ${GEM_VOLUME}
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: "/home/appuser/.claude"
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      SSH_AUTH_SOCK: /tmp/ssh-agent.sock
      RUSTFS_ENDPOINT: http://rustfs:9000
      DOMAIN: ${WORKTREE_HOST}
    profiles: ["do_not_start"]
    networks:
      - dev
    cap_add:
      - NET_ADMIN
      - NET_RAW
    entrypoint: ["entrypoint-claude.sh"]

volumes:
  home:
  db_data:
  rustfs_data:
  claude_config:
    external: true
  claude_bashhistory:
    external: true
  shared_gems:
    external: true
    name: ${GEM_VOLUME:-shared_gems}
  shared_node_modules:
    external: true
    name: ${NODE_MODULES_VOLUME:-shared_node_modules}

networks:
  dev:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400 # Fix for access when wireguard VPN is on host
  proxy:
    external: true
    name: ${PROJECT_PREFIX}_proxy

[env]
UID = "{{exec(command='id -u')}}"
GID = "{{exec(command='id -g')}}"
PROJECT_PREFIX = "{{env.PROJECT_PREFIX | default(value='default')}}"
GEM_VOLUME_BASE = "{{env.GEM_VOLUME_BASE | default(value='default_shared_gems')}}"

[tasks.nvim]
description = "Connect to Neovim in the container with theme sync."
run = """
  nvim --remote-ui --server localhost:{{ env.NVIM_PORT }}
"""
alias = "v"

[tasks.test]
description = "Start the Retest runner."
depends = ["up"]
run = """
  CMD='gem list -i retest > /dev/null 2>&1 || gem install retest && retest --rails'
  # `docker compose run` inherits the app service's traefik labels + proxy network,
  # so the one-off container registers as a second backend for the worktree host.
  # Traefik then round-robins onto it (nothing on :3000) → 502s. Opt it out.
  docker compose run -e DISABLE_COVERAGE=true --label "traefik.enable=false" --rm -it app sh -c "$CMD"
"""
alias = "t"

[tasks.rails]
description = "Enter the running Rails container."
run = "docker compose exec app /bin/zsh"

[tasks.rails_tests]
description = "Run the Rails unit tests. Pass any 'rails test' args (files, file:line, -n, --seed, ...) to run a subset."
depends = ["up"]
usage = 'arg "[args]" var=#true help="args forwarded to bin/rails test (e.g. test/models/foo.rb:42, -n /pattern/, --seed 123)"'
run = """
  if docker compose ps --services --filter "status=running" | grep -q '^app$'; then
    docker compose exec app bin/rails test $usage_args
  else
    docker compose run --label "traefik.enable=false" --rm app bin/rails test $usage_args
  fi
"""
alias = "rt"

[tasks.rails_sytem_tests]
description = "Run the Rails system tests. Pass any 'rails test:system' args (files, file:line, -n, --seed, ...) to run a subset."
depends = ["up"]
usage = 'arg "[args]" var=#true help="args forwarded to the test runner (e.g. test/system/foo_test.rb:42, --seed 123)"'
run = """
  # `rails test:system` hardcodes the whole test/system dir, so when a specific test
  # file is given, run it through the `rails test` runner (which honors explicit paths).
  # Otherwise stick with `test:system` so flags like --seed/-n apply to the full suite.
  case "$usage_args" in
    *_test.rb*) test_target="test $usage_args" ;;
    *)          test_target="test:system $usage_args" ;;
  esac
  if docker compose ps --services --filter "status=running" | grep -q '^app$'; then
    docker compose exec app bin/rails $test_target
  else
    docker compose run --label "traefik.enable=false" --rm app bin/rails $test_target
  fi
"""
alias = "rst"

[tasks.console]
description = "Enter the Rails console. Any args are forwarded to bin/rails console (e.g. -e production, --sandbox)."
usage = 'arg "[args]" var=#true help="args forwarded to bin/rails console (e.g. -e production, --sandbox)"'
run = """
  if docker compose ps --services --filter "status=running" | grep -q '^app$'; then
    docker compose exec app bin/rails console $usage_args
  else
    docker compose run -e DISABLE_LOGCRAFT=true --label "traefik.enable=false" --rm -it app bin/rails console $usage_args
  fi
"""
alias = "c"

[tasks.up]
description = "Start the application."
depends = ["proxy:up"]
run = """
  mkdir -p {{config_root}}/.docker-config/home/.ssh {{config_root}}/.docker-config/home/.config
  for vol in claude_config claude_bashhistory "$GEM_VOLUME" "$NODE_MODULES_VOLUME"; do
    docker volume inspect "$vol" >/dev/null 2>&1 || docker volume create "$vol" >/dev/null
  done
  docker compose up -d
"""
alias = "u"

[tasks."proxy:up"]
description = "Start the shared Traefik reverse proxy (one stack, all worktrees)."
alias = "proxy"
run = """
  COMPOSE_PROJECT_NAME=${PROJECT_PREFIX}-proxy \
  docker compose -f {{config_root}}/.docker-config/proxy/compose.yml up -d
"""

[tasks."proxy:down"]
description = "Stop the shared Traefik reverse proxy."
run = """
  COMPOSE_PROJECT_NAME=${PROJECT_PREFIX}-proxy \
  docker compose -f {{config_root}}/.docker-config/proxy/compose.yml down
"""

[tasks."proxy:logs"]
description = "Tail logs from the Traefik proxy."
run = """
  COMPOSE_PROJECT_NAME=${PROJECT_PREFIX}-proxy \
  docker compose -f {{config_root}}/.docker-config/proxy/compose.yml logs -f
"""

[tasks.ci]
description = "Run the CI linting and tests."
run = "docker compose run --label \"traefik.enable=false\" app bundle exec rake ci:build:commit"

[tasks.wt]
description = "Create a worktree: mise run wt <branch|PR#|new-branch-name>"
usage = 'arg "<branch>" help="existing branch name, PR number, or new branch name"'
run = '.scripts/create-worktree.sh "$usage_branch"'

[tasks."wt:ls"]
description = "List all worktrees"
run = ".scripts/list-worktrees.sh"

[tasks."wt:open"]
description = "Open the current worktree URL in a browser. Pass a browser binary name (e.g. firefox) to override xdg-open."
usage = 'arg "[browser]" help="optional browser binary; defaults to xdg-open"'
run = """
  url="http://${WORKTREE_HOST}"
  browser="${usage_browser:-}"
  if [ -n "$browser" ]; then
    if ! command -v "$browser" >/dev/null 2>&1; then
      echo "Error: '$browser' not found in PATH" >&2
      exit 1
    fi
    exec "$browser" "$url"
  fi
  if ! command -v xdg-open >/dev/null 2>&1; then
    echo "xdg-open not found. Pass a browser binary: mise run wt:open firefox" >&2
    exit 1
  fi
  exec xdg-open "$url"
"""

[tasks."db:dump"]
description = "Dump the development database and RustFS data for faster container setup."
run = """
  DUMP_DIR="{{ config_root }}/.docker-config/db-dumps"
  mkdir -p "$DUMP_DIR"
  docker compose exec -T db pg_dump -Fc -U postgres filial_health_rails_core_development \
    > "$DUMP_DIR/filial_health_rails_core_development.dump"
  echo "DB dump saved."
  docker run --rm \
    -v "${COMPOSE_PROJECT_NAME}_rustfs_data:/data:ro" \
    -v "$DUMP_DIR:/backup" \
    alpine tar czf /backup/rustfs_data.tar.gz -C /data .
  echo "RustFS dump saved."
  echo "All dumps saved to $DUMP_DIR"
"""

[tasks."db:dump:clear"]
description = "Remove all dump files so the next container start does a full db:prepare."
run = """
  DUMP_DIR="{{ config_root }}/.docker-config/db-dumps"
  rm -f "$DUMP_DIR"/*.dump "$DUMP_DIR"/*.sql "$DUMP_DIR"/*.sql.gz "$DUMP_DIR"/rustfs_data.tar.gz
  echo "Cleared all dump files from $DUMP_DIR"
"""

[tasks.claude]
description = "Run Claude AI assistant. Opens in a new Kitty tab if running inside Kitty, otherwise runs in the current terminal."
run = """
  if [ -n "${KITTY_PID:-}" ] && command -v kitty >/dev/null 2>&1; then
    kitty @ launch --type=tab --cwd=current --tab-title=Claude --copy-env=yes -- docker compose run --rm claude
  else
    docker compose run --rm claude
  fi
"""
alias = "ai"

[tasks."claude:rebuild"]
description = "Rebuild the Claude container with the latest Claude Code version."
run = "docker compose build --build-arg UPDATE_CLAUDE_CODE=$(date +%s) claude"

[tasks.destroy]
description = "Remove all docker resources (containers, networks, volumes, images) for this project and delete the project folder."
run = """
  set -e
  prefix="$PROJECT_PREFIX"
  [ -z "$prefix" ] && { echo "PROJECT_PREFIX is unset; refusing to destroy" >&2; exit 1; }
  if [ -f .mise/config.toml ]; then
    target=$(pwd)
  elif [ -f ../.mise/config.toml ]; then
    target=$(cd .. && pwd)
  else
    echo "Not at project root or a worktree; refusing to destroy" >&2
    exit 1
  fi
  cd "$HOME"
  pattern="^${prefix}[-_]"

  echo "This will remove:"
  echo "  - All docker containers/networks/volumes/images matching ${pattern}"
  echo "  - The project folder: ${target}"
  printf "Type 'destroy' to confirm: "
  read -r confirm
  [ "$confirm" = "destroy" ] || { echo "Aborted."; exit 1; }

  containers=$(docker ps -a --format '{% raw %}{{.Names}}{% endraw %}' | grep -E "$pattern" || true)
  if [ -n "$containers" ]; then
    echo "Removing containers:"; for x in $containers; do echo "  $x"; done
    echo "$containers" | xargs docker rm -f >/dev/null
  fi

  networks=$(docker network ls --format '{% raw %}{{.Name}}{% endraw %}' | grep -E "$pattern" || true)
  if [ -n "$networks" ]; then
    echo "Removing networks:"; for x in $networks; do echo "  $x"; done
    echo "$networks" | xargs docker network rm >/dev/null
  fi

  volumes=$(docker volume ls --format '{% raw %}{{.Name}}{% endraw %}' | grep -E "$pattern" || true)
  if [ -n "$volumes" ]; then
    echo "Removing volumes:"; for x in $volumes; do echo "  $x"; done
    echo "$volumes" | xargs docker volume rm >/dev/null
  fi

  images=$(docker images --format '{% raw %}{{.Repository}}:{{.Tag}}{% endraw %}' | grep -E "$pattern" || true)
  if [ -n "$images" ]; then
    echo "Removing images:"; for x in $images; do echo "  $x"; done
    echo "$images" | xargs docker rmi -f >/dev/null
  fi

  echo "Removing project folder: ${target}"
  rm -rf "$target"

  echo ""
  echo "Done. Your shell may be in a removed directory; run: cd ~"
"""

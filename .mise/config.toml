[env]
UID = "{{exec(command='id -u')}}"
GID = "{{exec(command='id -g')}}"
PROJECT_PREFIX = "{{env.PROJECT_PREFIX | default(value='default')}}"
GEM_VOLUME_BASE = "{{env.GEM_VOLUME_BASE | default(value='default_shared_gems')}}"

[tasks.nvim]
description = "Connect to Neovim in the container with theme sync."
# We use a shell subquery to detect Kitty's background and inject the '-c' flag
run = """
  nvim --remote-ui --server localhost:{{ env.NVIM_PORT }}
"""
alias = "v"

[tasks.test]
description = "Start the Retest runner."
run = "docker compose run -e DISABLE_COVERAGE=true --rm -it app sh -c 'gem list -i retest > /dev/null 2>&1 || gem install retest && retest --rails'"
alias = "t"

[tasks.rails]
description = "Enter the running Rails container."
run = "docker compose exec app /bin/zsh"

[tasks.rails_tests]
description = "Run the Rails unit tests."
run = "docker compose run --rm app bin/rails test"
alias = "rt"

[tasks.rails_sytem_tests]
description = "Run the Rails system tests."
run = "docker compose run --rm app bin/rails test:system"
alias = "rst"

[tasks.console]
description = "Enter the Rails console."
run = "docker compose run -e DISABLE_LOGCRAFT=true --rm -it app bin/rails console"
alias = "c"

[tasks.up]
description = "Start the application."
run = "docker compose up -d"
alias = "u"

[tasks.ci]
description = "Run the CI linting and tests."
run = "docker compose run app bundle exec rake ci:build:commit"

[tasks.init]
description = "Clone a repo into worktrees: mise run init <user/repo | git-url>"
usage = 'arg "<repo>" help="user/repo or git URL"'
run = '.scripts/init-repo.sh "$usage_repo"'

[tasks.wt]
description = "Create a worktree: mise run wt <branch|PR#|new-branch-name>"
usage = 'arg "<branch>" help="existing branch name, PR number, or new branch name"'
run = '.scripts/create-worktree.sh "$usage_branch"'

[tasks."wt:ls"]
description = "List all worktrees"
run = ".scripts/list-worktrees.sh"

[tasks."db:dump"]
description = "Dump the development database and RustFS data for faster container setup."
run = """
  DUMP_DIR="{{ config_root }}/.docker-config/db-dumps"
  mkdir -p "$DUMP_DIR"
  docker compose exec -T db pg_dump -Fc -U postgres filial_health_rails_core_development \
    > "$DUMP_DIR/filial_health_rails_core_development.dump"
  echo "DB dump saved."
  docker run --rm \
    -v "${COMPOSE_PROJECT_NAME}_rustfs_data:/data:ro" \
    -v "$DUMP_DIR:/backup" \
    alpine tar czf /backup/rustfs_data.tar.gz -C /data .
  echo "RustFS dump saved."
  echo "All dumps saved to $DUMP_DIR"
"""

[tasks."db:dump:clear"]
description = "Remove all dump files so the next container start does a full db:prepare."
run = """
  DUMP_DIR="{{ config_root }}/.docker-config/db-dumps"
  rm -f "$DUMP_DIR"/*.dump "$DUMP_DIR"/*.sql "$DUMP_DIR"/*.sql.gz "$DUMP_DIR"/rustfs_data.tar.gz
  echo "Cleared all dump files from $DUMP_DIR"
"""

[tasks.claude]
description = "Run Claude AI assistant in a new Kitty tab."
run = "kitty @ launch --type=tab --cwd=current --tab-title=Claude --copy-env=yes -- docker compose run --rm claude"
alias = "ai"

[tasks."claude:rebuild"]
description = "Rebuild the Claude container with the latest Claude Code version."
run = "docker compose build --build-arg UPDATE_CLAUDE_CODE=$(date +%s) claude"
